<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us - AI Job Portal</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

<!-- Navbar -->
<header class="navbar">
    <div class="logo">
        <i class="fa-solid fa-briefcase"></i>
        <span>AI Job Portal</span>
    </div>

    <nav>
        <a href="../Landing page/landing.html">Home</a>
        <a href="../Aboutus/us.html">About</a>
        <!--<a href="#">Contact</a>-->
    </nav>
</header>

<!-- Contact Section -->
<section class="contact-container">

    <div class="contact-box">

        <h2>Contact Us</h2>
        <p>Facing any issue? Feel free to contact us. We are here to help you!</p>

        <form id="contactForm">

            <!-- Name -->
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>

            <!-- Email -->
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <!-- Subject -->
            <div class="input-group">
                <label>Subject</label>
                <input type="text" id="subject" placeholder="Enter subject">
            </div>

            <!-- Message -->
            <div class="input-group">
                <label>Your Issue</label>
                <textarea id="message" rows="4" placeholder="Describe your issue..." required></textarea>
            </div>

            <!-- Buttons -->
            <div class="buttons">
                <button type="reset" class="cancel">Cancel</button>
                <button type="submit" class="send">Send Message</button>
            </div>

        </form>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
